<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0b0e11', darkCard: '#15191c', darkBorder: '#2d333b', accent: '#3498db' } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-md border-b dark:border-darkBorder">
    <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
        <button onclick="history.back()" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-lg flex items-center gap-2 text-sm font-bold">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            পিছনে
        </button>
        <h1 class="text-xl font-black text-accent tracking-tighter cursor-pointer" onclick="location.href='index.html'">লেখক.</h1>
        <div class="w-10"></div> </div>
</nav>

<main class="max-w-2xl mx-auto px-4 py-10">
    <div id="profile-header" class="text-center mb-10">
        <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent"></div></div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8" id="user-stats">
        </div>

    <h3 class="font-black text-sm uppercase tracking-widest text-gray-400 mb-4 ml-1">সাম্প্রতিক আলোচনা</h3>
    <div id="user-posts-list" class="space-y-3">
        </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');

    if (uid) {
        loadUserProfile(uid);
    } else {
        document.body.innerHTML = "<div class='text-center py-20'>ইউজার পাওয়া যায়নি।</div>";
    }

    async function loadUserProfile(userId) {
        const q = query(collection(db, BASE_PATH), where("userId", "==", userId));
        
        onSnapshot(q, (snap) => {
            const allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const userPosts = allDocs.filter(d => !d.parentId);
            const userComments = allDocs.filter(d => d.parentId);
            
            if (allDocs.length > 0) {
                const user = allDocs[0];
                
                // প্রোফাইল হেডার
                document.getElementById('profile-header').innerHTML = `
                    <img src="${user.photoURL}" class="w-24 h-24 rounded-3xl border-4 border-white dark:border-darkCard shadow-xl mx-auto mb-4">
                    <h2 class="text-2xl font-black">${user.name}</h2>
                    <p class="text-accent text-xs font-bold uppercase tracking-tighter">${userId === 'phys.arif@gmail.com' ? 'Admin' : 'Member'}</p>
                `;

                // স্ট্যাটস
                document.getElementById('user-stats').innerHTML = `
                    <div class="bg-white dark:bg-darkCard p-4 rounded-2xl border dark:border-darkBorder text-center">
                        <div class="text-xl font-black text-accent">${userPosts.length}</div>
                        <div class="text-[10px] font-bold text-gray-400 uppercase">আলোচনা</div>
                    </div>
                    <div class="bg-white dark:bg-darkCard p-4 rounded-2xl border dark:border-darkBorder text-center">
                        <div class="text-xl font-black text-accent">${userComments.length}</div>
                        <div class="text-[10px] font-bold text-gray-400 uppercase">মন্তব্য</div>
                    </div>
                `;

                // পোস্টের তালিকা
                document.getElementById('user-posts-list').innerHTML = userPosts.map(p => `
                    <div onclick="location.href='post.html?id=${p.id}'" class="p-4 bg-white dark:bg-darkCard border dark:border-darkBorder rounded-xl cursor-pointer hover:border-accent transition-all">
                        <p class="text-sm font-semibold line-clamp-2">${p.msg}</p>
                        <span class="text-[10px] text-gray-400 font-bold uppercase mt-2 block">${p.category || 'সাধারণ'}</span>
                    </div>
                `).join('') || '<p class="text-center text-gray-400 py-10">কোনো পোস্ট পাওয়া যায়নি।</p>';
            }
        });
    }
</script>
</body>
</html>
