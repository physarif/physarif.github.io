<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .forum-card { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 3px solid transparent; 
        }
        .forum-card:hover { border-left-color: #3498db; }
        .tab-active { border-bottom: 2px solid #3498db; color: #3498db; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<main class="max-w-2xl mx-auto px-4 py-6">
    <!-- Top Header with Logout -->
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-bold">প্রোফাইল</h1>
        </div>
        <button id="logout-btn" class="px-4 py-1.5 bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 rounded-lg text-xs font-bold hover:bg-red-100 transition-all">লগ আউট</button>
    </div>

    <!-- User Info Section -->
    <div id="user-info" class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder shadow-sm mb-8">
        <div class="flex items-center gap-6">
            <img id="user-photo" src="https://via.placeholder.com/80" class="w-20 h-20 rounded-full border-2 border-accent/20 object-cover shadow-lg">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                    <h2 id="user-name" class="text-xl font-bold">লোড হচ্ছে...</h2>
                    <span id="user-badge" class="px-2 py-0.5 bg-accent/10 text-accent text-[10px] font-bold rounded-full border border-accent/20">সদস্য</span>
                </div>
                
                <div class="flex items-center gap-4 text-xs text-gray-500 dark:text-gray-400">
                    <div class="flex items-center gap-1">
                        <svg class="w-3.5 h-3.5 text-orange-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z"></path></svg>
                        <span>মোট আপভোট: <span id="total-upvotes" class="font-bold text-gray-800 dark:text-gray-200">০</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="flex border-b dark:border-darkBorder mb-6">
        <button id="tab-posts" class="flex-1 py-3 text-sm font-bold tab-active transition-all">পোস্টসমূহ</button>
        <button id="tab-comments" class="flex-1 py-3 text-sm font-bold text-gray-400 hover:text-accent transition-all">মন্তব্যসমূহ</button>
    </div>
    
    <!-- Content Area -->
    <div id="content-container" class="space-y-4">
        <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent"></div></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    let currentTab = 'posts';
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('user-photo').src = user.photoURL || 'https://via.placeholder.com/80';
            document.getElementById('user-name').innerText = user.displayName;
            fetchData();
        } else {
            location.href = 'index.html';
        }
    });

    function fetchData() {
        const container = document.getElementById('content-container');
        container.innerHTML = '<div class="flex justify-center py-10"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent"></div></div>';

        const q = query(collection(db, BASE_PATH), where("uid", "==", currentUser.uid));
        
        onSnapshot(q, (snapshot) => {
            const allData = snapshot.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => (b.at?.seconds || 0) - (a.at?.seconds || 0));
            
            // Calculate Total Upvotes
            const totalUpvotes = allData.reduce((acc, curr) => acc + (curr.votes || 0), 0);
            document.getElementById('total-upvotes').innerText = totalUpvotes;

            // Update Badge based on upvotes
            const badgeEl = document.getElementById('user-badge');
            if (totalUpvotes >= 100) { badgeEl.innerText = "মাস্টার লেখক"; badgeEl.className = "px-2 py-0.5 bg-orange-100 text-orange-600 text-[10px] font-bold rounded-full border border-orange-200"; }
            else if (totalUpvotes >= 50) { badgeEl.innerText = "সিনিয়র লেখক"; badgeEl.className = "px-2 py-0.5 bg-purple-100 text-purple-600 text-[10px] font-bold rounded-full border border-purple-200"; }
            else if (totalUpvotes >= 10) { badgeEl.innerText = "উদীয়মান লেখক"; badgeEl.className = "px-2 py-0.5 bg-blue-100 text-blue-600 text-[10px] font-bold rounded-full border border-blue-200"; }
            
            if (currentTab === 'posts') {
                const posts = allData.filter(p => !p.parentId);
                renderItems(posts, 'তুমি এখনো কোনো পোস্ট করোনি');
            } else {
                const comments = allData.filter(p => p.parentId);
                renderItems(comments, 'তুমি এখনো কোনো মন্তব্য করোনি');
            }
        });
    }

    function renderItems(items, emptyMsg) {
        const container = document.getElementById('content-container');
        if (items.length === 0) {
            container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm italic bg-white dark:bg-darkCard rounded-xl border dark:border-darkBorder">${emptyMsg}</div>`;
            return;
        }

        container.innerHTML = items.map(item => `
            <div class="forum-card bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-darkBorder shadow-sm cursor-pointer" 
                 onclick="location.href='post.html?id=${item.parentId || item.id}'">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] text-gray-400">${item.at ? new Date(item.at.seconds * 1000).toLocaleDateString('bn-BD') : ''}</span>
                    <span class="text-xs font-bold text-accent">${currentTab === 'posts' ? 'ভোট' : 'লাইক'}: ${item.votes || 0}</span>
                </div>
                <p class="text-sm text-gray-800 dark:text-gray-200 line-clamp-2">${item.msg || ''}</p>
                ${item.parentId ? `<p class="text-[10px] text-accent mt-2 font-medium">মূল পোস্ট দেখতে ক্লিক করো</p>` : ''}
            </div>
        `).join('');
    }

    document.getElementById('tab-posts').onclick = () => {
        currentTab = 'posts';
        updateTabUI();
        fetchData();
    };

    document.getElementById('tab-comments').onclick = () => {
        currentTab = 'comments';
        updateTabUI();
        fetchData();
    };

    function updateTabUI() {
        const postBtn = document.getElementById('tab-posts');
        const commBtn = document.getElementById('tab-comments');
        if (currentTab === 'posts') {
            postBtn.classList.add('tab-active'); postBtn.classList.remove('text-gray-400');
            commBtn.classList.remove('tab-active'); commBtn.classList.add('text-gray-400');
        } else {
            commBtn.classList.add('tab-active'); commBtn.classList.remove('text-gray-400');
            postBtn.classList.remove('tab-active'); postBtn.classList.add('text-gray-400');
        }
    }

    document.getElementById('logout-btn').onclick = () => {
        signOut(auth).then(() => location.href = 'index.html');
    };

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>
