<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .forum-card { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 3px solid transparent; 
        }
        .forum-card:hover { border-left-color: #3498db; }
        .tab-active { border-bottom: 2px solid #3498db; color: #3498db; }
        /* ৩ লাইন পর ডট ডট দেখানোর জন্য */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<main class="max-w-2xl mx-auto px-4 py-6">
    <!-- Top Header -->
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-bold">প্রোফাইল</h1>
        </div>
        <button id="logout-btn" class="px-4 py-1.5 bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 rounded-lg text-xs font-bold hover:bg-red-100 transition-all">লগ আউট</button>
    </div>

    <!-- User Section -->
    <div id="user-info" class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder shadow-sm mb-8">
        <div class="flex items-center gap-6">
            <img id="user-photo" src="https://via.placeholder.com/80" class="w-20 h-20 rounded-full border-2 border-accent/20 object-cover shadow-lg">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-2">
                    <h2 id="user-name" class="text-xl font-bold leading-none">লোড হচ্ছে...</h2>
                    <span id="user-badge" class="px-2 py-0.5 text-[10px] font-bold rounded-full border">সদস্য</span>
                </div>
                
                <div class="space-y-1.5">
                    <div class="flex items-center gap-1.5 text-[11px] text-gray-400">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span>যোগদান: <span id="join-date" class="font-medium">...</span></span>
                    </div>

                    <div class="flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400">
                        <svg class="w-3.5 h-3.5 text-orange-500" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z" clip-rule="evenodd"></path>
                        </svg>
                        <span>আপভোট: <span id="total-upvotes" class="font-bold text-gray-800 dark:text-gray-200">০</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="flex border-b dark:border-darkBorder mb-6">
        <button id="tab-posts" class="flex-1 py-3 text-[13px] font-bold tab-active transition-all">
            পোস্ট (<span id="count-posts">০</span>)
        </button>
        <button id="tab-comments" class="flex-1 py-3 text-[13px] font-bold text-gray-400 hover:text-accent transition-all">
            মন্তব্য (<span id="count-comments">০</span>)
        </button>
        <button id="tab-bookmarks" class="flex-1 py-3 text-[13px] font-bold text-gray-400 hover:text-accent transition-all">
            বুকমার্ক (<span id="count-bookmarks">০</span>)
        </button>
    </div>
    
    <div id="content-container" class="space-y-4">
        <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent"></div></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, doc, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';
    const BOOKMARK_PATH = 'blog_comments/pages/bookmarks';

    let currentTab = 'posts';
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('user-photo').src = user.photoURL || 'https://via.placeholder.com/80';
            document.getElementById('user-name').innerText = user.displayName;
            
            if(user.metadata.creationTime) {
                const date = new Date(user.metadata.creationTime);
                document.getElementById('join-date').innerText = date.toLocaleDateString('bn-BD', {month: 'long', year: 'numeric'});
            }
            
            fetchData();
        } else {
            location.href = 'index.html';
        }
    });

    async function fetchData() {
        const q = query(collection(db, BASE_PATH), where("uid", "==", currentUser.uid));
        
        onSnapshot(q, async (snapshot) => {
            const allData = snapshot.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .sort((a, b) => (b.at?.seconds || 0) - (a.at?.seconds || 0));
            
            const posts = allData.filter(p => !p.parentId);
            const comments = allData.filter(p => p.parentId);

            document.getElementById('count-posts').innerText = posts.length.toLocaleString('bn-BD');
            document.getElementById('count-comments').innerText = comments.length.toLocaleString('bn-BD');

            const totalUpvotes = allData.reduce((acc, curr) => acc + (curr.votes || 0), 0);
            document.getElementById('total-upvotes').innerText = totalUpvotes.toLocaleString('bn-BD');

            updateBadge(totalUpvotes);

            const bq = query(collection(db, BOOKMARK_PATH), where("uid", "==", currentUser.uid));
            const bSnapshot = await getDocs(bq);
            const bookmarks = bSnapshot.docs.map(d => d.data());
            document.getElementById('count-bookmarks').innerText = bookmarks.length.toLocaleString('bn-BD');

            if (currentTab === 'posts') {
                renderItems(posts, 'তুমি এখনো কোনো পোস্ট করোনি');
            } else if (currentTab === 'comments') {
                renderItems(comments, 'তুমি এখনো কোনো মন্তব্য করোনি');
            } else if (currentTab === 'bookmarks') {
                renderBookmarks(bookmarks);
            }
        });
    }

    function updateBadge(totalUpvotes) {
        const badgeEl = document.getElementById('user-badge');
        if (currentUser.email === 'phys.arif@gmail.com') {
            badgeEl.innerText = "এডমিন";
            badgeEl.className = "px-2 py-0.5 bg-red-100 text-red-600 text-[10px] font-bold rounded-full border border-red-200 dark:bg-red-900/20 dark:text-red-400 dark:border-red-800";
        } else if (totalUpvotes >= 100) { 
            badgeEl.innerText = "মাস্টার লেখক"; 
            badgeEl.className = "px-2 py-0.5 bg-orange-100 text-orange-600 text-[10px] font-bold rounded-full border border-orange-200 dark:bg-orange-900/20 dark:text-orange-400 dark:border-orange-800"; 
        } else if (totalUpvotes >= 50) { 
            badgeEl.innerText = "সিনিয়র লেখক"; 
            badgeEl.className = "px-2 py-0.5 bg-purple-100 text-purple-600 text-[10px] font-bold rounded-full border border-purple-200 dark:bg-purple-900/20 dark:text-purple-400 dark:border-purple-800"; 
        } else if (totalUpvotes >= 10) { 
            badgeEl.innerText = "উদীয়মান লেখক"; 
            badgeEl.className = "px-2 py-0.5 bg-blue-100 text-blue-600 text-[10px] font-bold rounded-full border border-blue-200 dark:bg-blue-900/20 dark:text-blue-400 dark:border-blue-800"; 
        } else {
            badgeEl.innerText = "সদস্য";
            badgeEl.className = "px-2 py-0.5 bg-gray-100 text-gray-600 text-[10px] font-bold rounded-full border border-gray-200 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-700";
        }
    }

    function renderItems(items, emptyMsg) {
        const container = document.getElementById('content-container');
        if (items.length === 0) {
            container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm italic bg-white dark:bg-darkCard rounded-xl border dark:border-darkBorder">${emptyMsg}</div>`;
            return;
        }

        container.innerHTML = items.map(item => `
            <div class="forum-card bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-darkBorder shadow-sm cursor-pointer" 
                 onclick="location.href='post.html?id=${item.parentId || item.id}'">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] text-gray-400">${item.at ? new Date(item.at.seconds * 1000).toLocaleDateString('bn-BD') : ''}</span>
                    <span class="text-xs font-bold text-accent">${item.parentId ? 'লাইক' : 'ভোট'}: ${(item.votes || 0).toLocaleString('bn-BD')}</span>
                </div>
                <p class="text-sm text-gray-800 dark:text-gray-200 line-clamp-3">${item.msg || ''}</p>
                ${item.parentId ? `<p class="text-[10px] text-accent mt-2 font-medium">মূল পোস্ট দেখতে ক্লিক করো</p>` : ''}
            </div>
        `).join('');
    }

    async function renderBookmarks(bookmarks) {
        const container = document.getElementById('content-container');
        if (bookmarks.length === 0) {
            container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm italic bg-white dark:bg-darkCard rounded-xl border dark:border-darkBorder">তুমি কোনো পোস্ট বুকমার্ক করোনি</div>`;
            return;
        }

        const postPromises = bookmarks.map(b => getDocs(query(collection(db, BASE_PATH), where("__name__", "==", b.postId))));
        const postSnapshots = await Promise.all(postPromises);
        const bookmarkedPosts = postSnapshots.map(s => s.docs[0]?.data() ? {id: s.docs[0].id, ...s.docs[0].data()} : null).filter(p => p !== null);

        container.innerHTML = bookmarkedPosts.map(post => `
            <div class="forum-card bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-darkBorder shadow-sm cursor-pointer" 
                 onclick="location.href='post.html?id=${post.id}'">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <img src="${post.userPhoto || 'https://via.placeholder.com/30'}" class="w-4 h-4 rounded-full">
                        <span class="text-[10px] font-bold">${post.userName || 'অজানা'}</span>
                    </div>
                    <svg class="w-3.5 h-3.5 text-accent" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                </div>
                <p class="text-sm text-gray-800 dark:text-gray-200 line-clamp-3">${post.msg || ''}</p>
                <div class="mt-2 flex items-center justify-between">
                     <span class="text-[10px] text-gray-400">${post.at ? new Date(post.at.seconds * 1000).toLocaleDateString('bn-BD') : ''}</span>
                     <span class="text-[10px] font-bold text-accent">ভোট: ${(post.votes || 0).toLocaleString('bn-BD')}</span>
                </div>
            </div>
        `).join('');
    }

    function updateTabUI() {
        const tabs = ['tab-posts', 'tab-comments', 'tab-bookmarks'];
        tabs.forEach(t => {
            const el = document.getElementById(t);
            if (t === `tab-${currentTab}`) {
                el.classList.add('tab-active');
                el.classList.remove('text-gray-400');
            } else {
                el.classList.remove('tab-active');
                el.classList.add('text-gray-400');
            }
        });
    }

    document.getElementById('tab-posts').onclick = () => { currentTab = 'posts'; updateTabUI(); fetchData(); };
    document.getElementById('tab-comments').onclick = () => { currentTab = 'comments'; updateTabUI(); fetchData(); };
    document.getElementById('tab-bookmarks').onclick = () => { currentTab = 'bookmarks'; updateTabUI(); fetchData(); };

    document.getElementById('logout-btn').onclick = () => { signOut(auth).then(() => location.href = 'index.html'); };
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
</script>
</body>
</html>
