<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .forum-card { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 3px solid transparent; 
        }
        .forum-card:hover { border-left-color: #3498db; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<main class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-center gap-4 mb-8">
        <button onclick="location.href='index.html'" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-xl font-bold">প্রোফাইল</h1>
    </div>

    <div id="user-info" class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder shadow-sm mb-8 text-center">
        <div class="flex justify-center mb-4">
            <img id="user-photo" src="https://via.placeholder.com/80" class="w-20 h-20 rounded-full border-4 border-accent/20 object-cover">
        </div>
        <h2 id="user-name" class="text-xl font-bold mb-1">...</h2>
        <p id="user-email" class="text-sm text-gray-500 mb-4 italic">...</p>
        <button id="logout-btn" class="px-6 py-2 bg-red-50 text-red-500 dark:bg-red-500/10 dark:text-red-400 rounded-lg text-sm font-bold hover:bg-red-100 transition-all">লগ আউট</button>
    </div>

    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"></path></svg>
        আপনার পোস্টসমূহ
    </h3>
    
    <div id="user-posts" class="space-y-4">
        <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent"></div></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Update UI with user info
            document.getElementById('user-photo').src = user.photoURL;
            document.getElementById('user-name').innerText = user.displayName;
            document.getElementById('user-email').innerText = user.email;

            // Fetch User's Posts
            const q = query(collection(db, BASE_PATH), where("uid", "==", user.uid), orderBy("at", "desc"));
            onSnapshot(q, (snapshot) => {
                const posts = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => !p.parentId);
                renderUserPosts(posts);
            });
        } else {
            location.href = 'index.html';
        }
    });

    function renderUserPosts(posts) {
        const container = document.getElementById('user-posts');
        if (posts.length === 0) {
            container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm italic bg-white dark:bg-darkCard rounded-xl border dark:border-darkBorder">আপনি এখনো কোনো পোস্ট করেননি</div>`;
            return;
        }

        container.innerHTML = posts.map(p => `
            <div class="forum-card bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-darkBorder shadow-sm cursor-pointer" onclick="location.href='post.html?id=${p.id}'">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] text-gray-400">${p.at ? new Date(p.at.seconds * 1000).toLocaleDateString('bn-BD') : ''}</span>
                    <span class="text-xs font-bold text-accent">ভোট: ${p.votes || 0}</span>
                </div>
                <p class="text-sm text-gray-800 dark:text-gray-200 line-clamp-2">${p.msg || ''}</p>
            </div>
        `).join('');
    }

    document.getElementById('logout-btn').onclick = () => {
        signOut(auth).then(() => location.href = 'index.html');
    };

    // Auto Dark Mode
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>
