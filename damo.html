<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Reels Host</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 350px; height: 600px; border: 2px solid #333; border-radius: 20px; overflow: hidden; position: relative; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .ui { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 10; }
        button { background: #ff0050; border: none; padding: 12px 25px; color: #fff; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #status { font-size: 12px; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <video id="player" controls loop autoplay muted playsinline></video>
        <div class="ui">
            <h3 id="header">Upload Reel</h3>
            <p id="status">Select an MP4 file</p>
            <input type="file" id="fileInput" accept="video/mp4" hidden>
            <button id="btn">Choose Video</button>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const player = document.getElementById('player');
        const header = document.getElementById('header');

        btn.onclick = () => fileInput.click();

        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            btn.style.display = 'none';
            header.innerText = "Uploading...";
            status.innerText = "এটি কিছুক্ষণ সময় নিতে পারে...";

            const formData = new FormData();
            formData.append('file', file);

            const auth = btoa("Phys.arif@gmail.com:Arif1234");

            try {
                // সরাসরি কল না করে আমরা একটি CORS Proxy ব্যবহার করছি
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.streamable.com/upload'), {
                    method: 'POST',
                    // Note: Allorigins বা এই ধরণের প্রক্সিতে বড় ফাইল আপলোডে সীমাবদ্ধতা থাকতে পারে
                });

                // বাস্তবতা হলো: ব্রাউজার থেকে সরাসরি Streamable এ বড় ফাইল আপলোড 'CORS' এর কারণে আটকে যায়। 
                // তাই সবচেয়ে ভালো উপায় হলো Cloudinary। 
                alert("ব্রাউজার সিকিউরিটির কারণে সরাসরি আপলোড সম্ভব হচ্ছে না। আমি কি Cloudinary-র কোড দেব? ওটা গ্যারান্টিড কাজ করবে।");

            } catch (e) {
                status.innerText = "Error: " + e.message;
                btn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
