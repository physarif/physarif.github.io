<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Reels Host</title>
    <style>
        /* CSS: রিলস ডিজাইন */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .reels-container {
            width: 100%; max-width: 400px; height: 90vh;
            background: #111; border-radius: 15px;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #reelPlayer {
            width: 100%; height: 100%; object-fit: cover;
            display: none; /* আপলোড হওয়ার আগে লুকানো থাকবে */
        }

        .upload-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center;
            background: rgba(0,0,0,0.6);
        }

        .btn-upload {
            background: #ff0050; color: white; border: none;
            padding: 15px 30px; border-radius: 30px;
            font-size: 16px; cursor: pointer; font-weight: bold;
            transition: 0.3s; margin-top: 10px;
        }

        .btn-upload:hover { background: #e60048; transform: scale(1.05); }

        #status { margin-top: 15px; font-size: 14px; color: #ccc; }

        /* কাস্টম লোডার */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #ff0050;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="reels-container">
        <video id="reelPlayer" loop autoplay muted playsinline controls></video>

        <div class="upload-overlay" id="uploadOverlay">
            <div class="loader" id="loader"></div>
            <h2 id="msgTitle">Upload Your Reel</h2>
            <p id="status">MP4 ভিডিও সিলেক্ট করো (Max 1GB)</p>
            <input type="file" id="videoInput" accept="video/mp4" hidden>
            <button class="btn-upload" id="selectBtn">Select Video</button>
        </div>
    </div>

    <script>
        const selectBtn = document.getElementById('selectBtn');
        const videoInput = document.getElementById('videoInput');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const uploadOverlay = document.getElementById('uploadOverlay');
        const reelPlayer = document.getElementById('reelPlayer');
        const msgTitle = document.getElementById('msgTitle');

        // তোমার দেওয়া তথ্য অনুযায়ী Auth Header তৈরি
        const email = "Phys.arif@gmail.com";
        const password = "Arif1234";
        const authHeader = "Basic " + btoa(email + ":" + password);

        selectBtn.addEventListener('click', () => videoInput.click());

        videoInput.addEventListener('change', async () => {
            const file = videoInput.files[0];
            if (!file) return;

            // আপলোড শুরু
            selectBtn.style.display = 'none';
            loader.style.display = 'block';
            msgTitle.innerText = "Uploading...";
            status.innerText = "দয়া করে অপেক্ষা করো, ভিডিও আপলোড হচ্ছে...";

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('https://api.streamable.com/upload', {
                    method: 'POST',
                    headers: { 'Authorization': authHeader },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    status.innerText = "আপলোড সফল! ভিডিও প্রসেস হচ্ছে...";
                    
                    // Streamable এ ভিডিও প্রসেস হতে কয়েক সেকেন্ড লাগে
                    setTimeout(() => {
                        const videoUrl = `https://streamable.com/e/${data.shortcode}`;
                        
                        // ওভারলে সরিয়ে ভিডিও প্লে করা
                        uploadOverlay.style.background = "transparent";
                        uploadOverlay.style.display = "none";
                        
                        reelPlayer.src = videoUrl;
                        reelPlayer.style.display = "block";
                        reelPlayer.play();
                    }, 3000); // ৩ সেকেন্ড অপেক্ষা করবে প্রসেসিংয়ের জন্য

                } else {
                    throw new Error("ইমেইল বা পাসওয়ার্ড ভুল অথবা সার্ভার সমস্যা।");
                }
            } catch (error) {
                loader.style.display = 'none';
                selectBtn.style.display = 'block';
                msgTitle.innerText = "Error!";
                status.innerText = error.message;
            }
        });
    </script>
</body>
</html>
