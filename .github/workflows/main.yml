name: Generate CastFM APK
on: 
  workflow_dispatch: # এটি দিলে তুমি ম্যানুয়ালি বাটন টিপে বিল্ড শুরু করতে পারবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        # এখানে তোমার PWA URL এবং আইকন লিঙ্কগুলো অটোমেটিক নিয়ে নেবে
        run: |
          bubblewrap init --manifest=https://castfm.pages.dev/manifest.json --directory=./ --metaData=./twa-manifest.json
          bubblewrap build --skip-signing
        # আপাতত '--skip-signing' দিচ্ছি যাতে দ্রুত টেস্ট বিল্ড পাওয়া যায়। 
        # পরে প্লে-স্টোরে দিতে চাইলে আমরা সাইনিং কী অ্যাড করব।

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: CastFM-Release-APK
          path: ./*.apk
