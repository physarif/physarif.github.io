name: Generate CastFM APK
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        # এখানে --packageId যোগ করা হয়েছে যা সমস্যার সমাধান করবে
        run: |
          bubblewrap init --manifest=https://castfm.pages.dev/manifest.json \
            --directory=./ \
            --packageId=com.castfm.app \
            --metaData=./twa-manifest.json \
            --no-prompt
          bubblewrap build --skip-signing

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CastFM-Release-APK
          path: ./*.apk
