name: Generate CastFM APK
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # কনফিগারেশন ফাইল তৈরি করা যাতে Bubblewrap প্রশ্ন না করে
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"/usr/local/lib/android/sdk"}' > ~/.bubblewrap/config.json
          
          # এবার বিল্ড শুরু
          bubblewrap init --manifest=https://castfm.pages.dev/manifest.json --directory=./ --packageId=com.castfm.app --no-prompt
          bubblewrap build --skip-signing

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CastFM-Release-APK
          path: ./*.apk
