name: Generate CastFM APK
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # আপডেট করা হয়েছে v4 এ

      - name: Set up Node.js
        uses: actions/setup-node@v4 # আপডেট করা হয়েছে v4 এ
        with:
          node-version: 20 # লেটেস্ট স্টেবল ভার্সন

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize and Build APK
        run: |
          bubblewrap init --manifest=https://castfm.pages.dev/manifest.json --directory=./ --metaData=./twa-manifest.json
          bubblewrap build --skip-signing

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # এখানে v4 ব্যবহার করা হয়েছে, যা এররটি সমাধান করবে
        with:
          name: CastFM-Release-APK
          path: ./*.apk
