name: Generate CastFM APK
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Android App
        uses: flaming-codes/pwa-to-offline-app-action@v1.2.2
        with:
          # তোমার PWA এর লিঙ্ক
          web-manifest-url: https://castfm.pages.dev/manifest.json
          # অ্যান্ড্রয়েড প্যাকেজ আইডি
          package-id: com.castfm.app
          # কীস্টোর ছাড়াই টেস্ট বিল্ড তৈরি করবে
          skip-signing: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CastFM-App
          path: ./*.apk
