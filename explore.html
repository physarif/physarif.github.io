<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অনুসন্ধান - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .forum-card { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .forum-card:hover { border-left-color: #3498db; transform: translateX(4px); }
        .highlight { background-color: rgba(52, 152, 219, 0.2); color: #3498db; font-weight: 600; padding: 0 2px; border-radius: 2px; }
        .search-input:focus { border-color: #3498db; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 min-h-screen">

<main class="max-w-2xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="location.href='index.html'" class="p-2 hover:bg-gray-200 dark:hover:bg-darkCard rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-2xl font-bold tracking-tight">অনুসন্ধান</h1>
        </div>
        <button id="toggle-filter" class="text-sm font-medium text-accent hover:underline">ফিল্টার</button>
    </div>

    <div class="relative mb-4">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <input type="text" id="search-input" placeholder="লেখকের নাম বা কী-ওয়ার্ড দিয়ে খুঁজুন..." 
            class="search-input w-full pl-12 pr-4 py-4 bg-white dark:bg-darkCard border dark:border-darkBorder rounded-2xl shadow-sm text-base transition-all">
    </div>

    <div id="filter-box" class="hidden mb-6 p-4 bg-white dark:bg-darkCard border dark:border-darkBorder rounded-2xl">
        <p class="text-xs font-semibold text-gray-500 mb-3 uppercase">তারিখ অনুযায়ী খুঁজুন</p>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-[10px] text-gray-400 mb-1">থেকে</label>
                <input type="date" id="start-date" class="w-full p-2 bg-gray-50 dark:bg-darkBg border dark:border-darkBorder rounded-lg text-sm outline-none">
            </div>
            <div>
                <label class="block text-[10px] text-gray-400 mb-1">পর্যন্ত</label>
                <input type="date" id="end-date" class="w-full p-2 bg-gray-50 dark:bg-darkBg border dark:border-darkBorder rounded-lg text-sm outline-none">
            </div>
        </div>
        <button id="clear-date" class="mt-3 text-[10px] text-red-500 uppercase font-bold">তারিখ মুছুন</button>
    </div>

    <div id="tags-section" class="mb-6 hidden">
        <h2 class="text-xs font-semibold uppercase text-gray-500 mb-3 px-1">জনপ্রিয় ট্যাগ</h2>
        <div id="tags-list" class="flex flex-wrap gap-2"></div>
    </div>

    <div id="history-section" class="mb-6 hidden">
        <h2 class="text-xs font-semibold uppercase text-gray-500 mb-3 px-1">সাম্প্রতিক অনুসন্ধান</h2>
        <div id="history-chips" class="flex flex-wrap gap-2"></div>
    </div>

    <div id="result-stats" class="mb-4 px-1 text-xs text-gray-500 hidden"></div>

    <div id="results-container" class="space-y-4">
        <div class="text-center py-20">
            <p class="text-gray-500">আপনার পছন্দের লেখা বা লেখক খুঁজুন</p>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    let allPosts = [];
    const searchInput = document.getElementById('search-input');
    const container = document.getElementById('results-container');
    const stats = document.getElementById('result-stats');
    const historySection = document.getElementById('history-section');
    const tagsSection = document.getElementById('tags-section');
    const filterBox = document.getElementById('filter-box');
    const startDateInput = document.getElementById('start-date');
    const endDateInput = document.getElementById('end-date');

    onSnapshot(collection(db, BASE_PATH), (snapshot) => {
        allPosts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                    .filter(p => !p.parentId);
        updateTags(allPosts);
    });

    // Toggle Filter Box
    document.getElementById('toggle-filter').addEventListener('click', () => {
        filterBox.classList.toggle('hidden');
    });

    // Search & Filter Logic
    const performSearch = () => {
        const term = searchInput.value.toLowerCase().trim();
        const start = startDateInput.value ? new Date(startDateInput.value).getTime() : null;
        const end = endDateInput.value ? new Date(endDateInput.value).setHours(23, 59, 59) : null;

        if (term.length === 0 && !start && !end) {
            showDefault();
            return;
        }

        const filtered = allPosts.filter(p => {
            const matchesTerm = !term || (
                (p.msg && p.msg.toLowerCase().includes(term)) || 
                (p.name && p.name.toLowerCase().includes(term)) ||
                (p.tags && p.tags.some(t => t.toLowerCase().includes(term)))
            );

            // তারিখ ফিল্টার (ধরে নেওয়া হয়েছে p.timestamp আছে)
            let matchesDate = true;
            if (p.timestamp) {
                const postTime = p.timestamp.seconds ? p.timestamp.seconds * 1000 : p.timestamp;
                if (start && postTime < start) matchesDate = false;
                if (end && postTime > end) matchesDate = false;
            }

            return matchesTerm && matchesDate;
        });

        renderResults(filtered, term);
    };

    searchInput.addEventListener('input', performSearch);
    startDateInput.addEventListener('change', performSearch);
    endDateInput.addEventListener('change', performSearch);
    document.getElementById('clear-date').onclick = () => {
        startDateInput.value = '';
        endDateInput.value = '';
        performSearch();
    };

    function renderResults(posts, term) {
        historySection.classList.add('hidden');
        tagsSection.classList.add('hidden');
        
        if (posts.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-gray-400">কোনো ফলাফল পাওয়া যায়নি!</div>`;
            stats.classList.add('hidden');
            return;
        }

        stats.innerText = `মোট ${posts.length}টি ফলাফল পাওয়া গেছে`;
        stats.classList.remove('hidden');

        container.innerHTML = posts.map(p => {
            const highlightedMsg = highlightText(p.msg || '', term);
            const highlightedName = highlightText(p.name || 'Anonymous', term);

            return `
                <div class="forum-card bg-white dark:bg-darkCard p-5 rounded-2xl border dark:border-darkBorder shadow-sm cursor-pointer" 
                     onclick="saveSearch('${term}'); location.href='post.html?id=${p.id}'">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="${p.photoURL || 'https://ui-avatars.com/api/?name=' + p.name}" class="w-6 h-6 rounded-full border dark:border-gray-700">
                        <span class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">${highlightedName}</span>
                    </div>
                    <p class="text-sm leading-relaxed text-gray-800 dark:text-gray-200 line-clamp-3">${highlightedMsg}</p>
                </div>
            `;
        }).join('');
    }

    function highlightText(text, term) {
        if (!term) return text;
        const regex = new RegExp(`(${term})`, 'gi');
        return text.replace(regex, `<span class="highlight">$1</span>`);
    }

    function showDefault() {
        stats.classList.add('hidden');
        container.innerHTML = `<div class="text-center py-20 text-gray-400"><p>আপনার পছন্দের লেখা বা লেখক খুঁজুন</p></div>`;
        renderHistory();
        updateTags(allPosts);
    }

    window.saveSearch = (term) => {
        if (!term) return;
        let history = JSON.parse(localStorage.getItem('search_history') || '[]');
        if (!history.includes(term)) {
            history.unshift(term);
            localStorage.setItem('search_history', JSON.stringify(history.slice(0, 5)));
        }
    };

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('search_history') || '[]');
        if (history.length > 0 && searchInput.value === '') {
            historySection.classList.remove('hidden');
            document.getElementById('history-chips').innerHTML = history.map(h => `
                <button onclick="fillSearch('${h}')" class="px-3 py-1.5 bg-gray-200 dark:bg-darkBorder rounded-full text-xs hover:bg-accent hover:text-white transition-colors">
                    ${h}
                </button>
            `).join('');
        }
    }

    function updateTags(posts) {
        let allTags = [];
        posts.forEach(p => { if (p.tags && Array.isArray(p.tags)) allTags.push(...p.tags); });
        const uniqueTags = [...new Set(allTags)].slice(0, 10);

        if (uniqueTags.length > 0 && searchInput.value === '') {
            tagsSection.classList.remove('hidden');
            document.getElementById('tags-list').innerHTML = uniqueTags.map(tag => `
                <button onclick="fillSearch('${tag}')" class="px-3 py-1.5 border dark:border-darkBorder rounded-xl text-xs hover:border-accent hover:text-accent transition-all"># ${tag}</button>
            `).join('');
        }
    }

    window.fillSearch = (term) => {
        searchInput.value = term;
        performSearch();
    };

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
    renderHistory();
</script>
</body>
</html>
