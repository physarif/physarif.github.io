<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্লগ পোস্ট - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#121212', 
                        darkSurface: '#1e1e1e', 
                        accent: '#2563eb'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .blog-content { line-height: 1.8; font-size: 1.125rem; }
        .comment-border { border-left: 1px solid #e2e8f0; }
        .dark .comment-border { border-left-color: #334155; }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-darkBg dark:text-slate-200">

<nav class="border-b dark:border-slate-800 sticky top-0 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md z-10">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
        <button onclick="location.href='index.html'" class="flex items-center gap-2 text-sm font-medium hover:text-accent transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7 m0 0l7-7 m-7 7h18"></path></svg>
            ফিরে যান
        </button>
        <span class="font-bold tracking-tight text-xl">লেখক ফোরাম</span>
    </div>
</nav>

<main class="max-w-3xl mx-auto px-4 py-12">
    <article id="main-post-container">
        <div class="animate-pulse space-y-4">
            <div class="h-8 bg-gray-200 dark:bg-slate-800 w-3/4 rounded"></div>
            <div class="h-4 bg-gray-200 dark:bg-slate-800 w-1/4 rounded"></div>
            <div class="space-y-2 pt-8">
                <div class="h-4 bg-gray-100 dark:bg-slate-800 rounded"></div>
                <div class="h-4 bg-gray-100 dark:bg-slate-800 rounded w-5/6"></div>
            </div>
        </div>
    </article>

    <hr class="my-12 border-slate-100 dark:border-slate-800">

    <section>
        <h3 class="text-2xl font-bold mb-8">পাঠক মতামত</h3>
        <div id="replies-container" class="space-y-10">
            </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    if (!postId) location.href = 'index.html';

    // Load Main Post with Blog Layout
    onSnapshot(doc(db, BASE_PATH, postId), (docSnap) => {
        if (docSnap.exists()) {
            const p = docSnap.data();
            const date = p.at ? new Date(p.at.seconds * 1000).toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
            
            document.getElementById('main-post-container').innerHTML = `
                <header class="mb-8">
                    <h1 class="text-4xl font-extrabold mb-4 leading-tight">${p.title || 'শিরোনামহীন পোস্ট'}</h1>
                    <div class="flex items-center gap-4 text-sm text-slate-500 dark:text-slate-400">
                        <span class="font-medium text-slate-900 dark:text-slate-200">${p.name || 'অজ্ঞাত লেখক'}</span>
                        <span>•</span>
                        <time>${date}</time>
                        <span>•</span>
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 10h4.757c1.27 0 2.305 1.035 2.305 2.305s-1.035 2.305-2.305 2.305H14m0-4.61V7.695c0-1.27-1.035-2.305-2.305-2.305S9.39 6.425 9.39 7.695V10m4.61 0v4.61m-4.61-4.61H4.757C3.487 10 2.452 11.035 2.452 12.305s1.035 2.305 2.305 2.305H9.39m0-4.61v4.61"></path></svg>
                            ${p.votes || 0} পাঠক পছন্দ করেছেন
                        </span>
                    </div>
                </header>
                <div class="blog-content text-slate-700 dark:text-slate-300 whitespace-pre-wrap">
                    ${p.msg || ''}
                </div>
            `;
        } else {
            document.getElementById('main-post-container').innerHTML = `<p>নিবন্ধটি পাওয়া যায়নি।</p>`;
        }
    });

    // Load Replies with Clean Layout
    const q = query(collection(db, BASE_PATH), where("parentId", "==", postId), orderBy("at", "asc"));
    onSnapshot(q, (snapshot) => {
        const replies = snapshot.docs.map(d => d.data());
        const container = document.getElementById('replies-container');
        
        if (replies.length === 0) {
            container.innerHTML = `<p class="text-slate-400 italic">এখনো কোনো মতামত প্রদান করা হয়নি।</p>`;
            return;
        }

        container.innerHTML = replies.map(r => `
            <div class="comment-item">
                <div class="flex justify-between items-baseline mb-2">
                    <span class="font-bold text-slate-800 dark:text-slate-200">${r.name || 'নামহীন পাঠক'}</span>
                    <span class="text-[12px] text-slate-400">${r.at ? new Date(r.at.seconds * 1000).toLocaleDateString('bn-BD') : ''}</span>
                </div>
                <div class="text-slate-600 dark:text-slate-400 leading-relaxed border-l-2 border-slate-100 dark:border-slate-800 pl-4 py-1">
                    ${r.msg || ''}
                </div>
            </div>
        `).join('');
    });

    // Dark Mode Check
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>
