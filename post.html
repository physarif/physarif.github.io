<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিবন্ধ - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; scroll-behavior: smooth; }
        .blog-content { line-height: 1.8; font-size: 1.15rem; }
        .blog-content h2 { font-size: 1.8rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; }
        .blog-content p { margin-bottom: 1.5rem; color: #374151; }
        .dark .blog-content p { color: #d1d5db; }
        .blog-content img { border-radius: 16px; width: 100%; height: auto; margin: 2rem 0; }
        .blog-content blockquote { border-left: 4px solid #3498db; padding-left: 1.5rem; font-style: italic; color: #4b5563; margin: 2rem 0; }
        .progress-bar { height: 4px; background: #3498db; position: fixed; top: 0; left: 0; width: 0%; z-index: 100; transition: width 0.2s; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-darkBg dark:text-gray-100">

<div id="progress" class="progress-bar"></div>

<!-- ন্যাপবার -->
<nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-md border-b dark:border-darkBorder">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
        <button onclick="history.back()" class="flex items-center gap-2 text-sm font-medium hover:text-accent transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            ফিরে যান
        </button>
        <div class="flex items-center gap-3">
            <button class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg></button>
            <button class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg></button>
        </div>
    </div>
</nav>

<main class="max-w-3xl mx-auto px-4 py-10">
    <!-- ক্যাটাগরি ও তারিখ -->
    <div class="flex items-center gap-3 mb-4">
        <span class="bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">ব্লগ পোস্ট</span>
        <span id="post-date" class="text-sm text-gray-500">লোডিং...</span>
    </div>

    <!-- টাইটেল (যদি ডেটায় আলাদা টাইটেল থাকে, নাহলে প্রথম লাইন) -->
    <h1 id="post-title" class="text-3xl md:text-5xl font-bold leading-tight mb-8"></h1>

    <!-- লেখক প্রোফাইল -->
    <div class="flex items-center justify-between pb-8 border-b dark:border-darkBorder mb-10">
        <div class="flex items-center gap-4">
            <img id="author-img" src="" alt="Author" class="w-12 h-12 rounded-full ring-2 ring-gray-100 dark:ring-darkBorder">
            <div>
                <p class="text-sm font-bold" id="author-name"></p>
                <p class="text-xs text-gray-500">৫ মিনিট পাঠ</p>
            </div>
        </div>
        <button class="text-sm font-bold text-accent border border-accent/30 px-4 py-1.5 rounded-full hover:bg-accent hover:text-white transition-all">ফলো করুন</button>
    </div>

    <!-- মূল আর্টিকেল কন্টেন্ট -->
    <div id="post-content" class="blog-content">
        <!-- Skeleton Loading -->
        <div class="animate-pulse space-y-6">
            <div class="h-6 bg-gray-200 dark:bg-darkBorder rounded w-full"></div>
            <div class="h-6 bg-gray-200 dark:bg-darkBorder rounded w-5/6"></div>
            <div class="h-6 bg-gray-200 dark:bg-darkBorder rounded w-4/6"></div>
            <div class="h-64 bg-gray-200 dark:bg-darkBorder rounded-2xl w-full"></div>
        </div>
    </div>

    <!-- ট্যাগস -->
    <div id="post-tags" class="mt-12 flex flex-wrap gap-2"></div>

    <!-- ইন্টারঅ্যাকশন বার -->
    <div class="mt-12 p-6 bg-gray-50 dark:bg-darkCard rounded-2xl flex items-center justify-between">
        <div class="flex items-center gap-6">
            <button class="flex items-center gap-2 group">
                <svg class="w-6 h-6 text-gray-500 group-hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                <span id="vote-count" class="font-bold">০</span>
            </button>
            <button class="flex items-center gap-2 group">
                <svg class="w-6 h-6 text-gray-500 group-hover:text-accent transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                <span class="font-bold">মন্তব্য</span>
            </button>
        </div>
        <div class="flex gap-2">
            <button class="p-2 bg-white dark:bg-darkBg rounded-full shadow-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg></button>
            <button class="p-2 bg-white dark:bg-darkBg rounded-full shadow-sm"><svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg></button>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    // রিডিং প্রগ্রেস বার
    window.onscroll = function() {
        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        document.getElementById("progress").style.width = scrolled + "%";
    };

    async function loadPost() {
        if (!postId) return;

        try {
            const docSnap = await getDoc(doc(db, BASE_PATH, postId));

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // টাইটেল এক্সট্র্যাক্ট করা (প্রথম লাইনকে টাইটেল হিসেবে ধরা)
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = data.msg;
                const firstLine = tempDiv.innerText.split('\n')[0] || "শিরোনামহীন পোস্ট";
                document.getElementById('post-title').innerText = firstLine;
                
                document.getElementById('post-content').innerHTML = data.msg;
                document.getElementById('author-name').innerText = data.name;
                document.getElementById('author-img').src = data.photoURL || `https://ui-avatars.com/api/?name=${data.name}&background=random`;
                document.getElementById('vote-count').innerText = data.votes || 0;

                if (data.at) {
                    const date = data.at.toDate();
                    document.getElementById('post-date').innerText = date.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
                }

                if (data.hashtags) {
                    document.getElementById('post-tags').innerHTML = data.hashtags.map(tag => 
                        `<a href="#" class="bg-gray-100 dark:bg-darkCard px-4 py-2 rounded-lg text-sm font-medium hover:bg-accent hover:text-white transition-all">${tag}</a>`
                    ).join('');
                }
            }
        } catch (e) {
            console.error(e);
        }
    }

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }

    loadPost();
</script>
</body>
</html>
