<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিবন্ধ - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <script>
        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();
        
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; scroll-behavior: smooth; }
        .ql-editor { padding: 0 !important; height: auto !important; overflow-y: visible !important; line-height: 1.8; font-size: 1.15rem; }
        .ql-editor p { margin-bottom: 12px !important; }
        .ql-editor ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .ql-editor ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        .ql-editor blockquote { border-left: 4px solid #3498db; padding-left: 16px; font-style: italic; margin-bottom: 1em; color: #6b7280; }
        .dark .ql-editor { color: #d1d5db; }
        .ql-editor img { border-radius: 12px; max-width: 100%; height: auto; display: block; margin: 1.5rem auto; }
        #editor-container { font-family: 'Hind Siliguri', sans-serif; height: 350px; }
        .nav-icon { @apply p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors text-gray-500 flex items-center justify-center; }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-darkBg dark:text-gray-100">

<nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-md border-b dark:border-darkBorder">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
        <button onclick="window.history.back()" class="flex items-center gap-2 text-sm font-medium hover:text-accent transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            ফিরে যান
        </button>
        <div id="action-icons" class="flex items-center gap-3 text-xs text-gray-400">অ্যাকশন লোড হচ্ছে...</div>
    </div>
</nav>

<main class="max-w-3xl mx-auto px-4 py-10">
    <div class="flex items-center justify-between pb-8 border-b dark:border-darkBorder mb-10">
        <div class="flex items-center gap-4">
            <img id="author-img" src="" alt="" class="w-12 h-12 rounded-full hidden ring-2 ring-gray-100 dark:ring-darkBorder">
            <div>
                <p class="text-sm font-bold" id="author-name"></p>
                <p id="post-date" class="text-xs text-gray-500 mt-0.5"></p>
            </div>
        </div>
    </div>

    <div class="ql-snow">
        <div id="post-content" class="ql-editor mb-12"></div>
    </div>
    <div id="post-tags" class="mb-16 flex flex-wrap gap-2"></div>

    <div id="edit-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkCard w-full max-w-3xl rounded-2xl shadow-2xl">
            <div class="p-4 border-b dark:border-darkBorder flex justify-between items-center">
                <h3 class="font-bold text-lg">পোস্ট এডিট করুন</h3>
                <button onclick="toggleEditModal(false)" class="p-2 hover:bg-gray-100 dark:hover:bg-darkBg rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4">
                <div id="editor-container" class="bg-gray-50 text-gray-900"></div>
                <div class="flex justify-end gap-3 mt-4">
                    <button onclick="toggleEditModal(false)" class="px-6 py-2 rounded-full font-bold bg-gray-200 dark:bg-darkBg">বাতিল</button>
                    <button id="save-edit-btn" class="px-8 py-2 rounded-full font-bold bg-accent text-white hover:bg-blue-600 transition-shadow">সেভ করুন</button>
                </div>
            </div>
        </div>
    </div>

    <section class="border-t dark:border-darkBorder pt-10">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            মন্তব্যসমূহ
        </h3>
        <div id="comment-form-container" class="hidden bg-gray-50 dark:bg-darkCard p-4 rounded-2xl mb-10 border dark:border-darkBorder">
            <div class="flex items-center gap-3 mb-3">
                <img id="current-user-img" src="" class="w-8 h-8 rounded-full border dark:border-darkBorder">
                <span id="current-user-name" class="text-sm font-bold text-accent"></span>
            </div>
            <textarea id="comment-text" rows="3" placeholder="আপনার মন্তব্য লিখুন..." class="w-full bg-white dark:bg-darkBg border dark:border-darkBorder rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-accent"></textarea>
            <div class="flex justify-end mt-3">
                <button id="submit-comment" class="bg-accent text-white px-6 py-2 rounded-full font-bold hover:bg-blue-600 transition-colors">মন্তব্য করুন</button>
            </div>
        </div>
        <div id="login-prompt" class="bg-blue-50 dark:bg-blue-900/20 p-6 rounded-2xl mb-10 text-center">
            <p class="text-sm text-blue-600 dark:text-blue-400 mb-4 font-medium">মন্তব্য করতে দয়া করে লগইন করুন</p>
            <button id="login-btn" class="bg-accent text-white px-8 py-2 rounded-full font-bold shadow-lg shadow-blue-500/20">Google দিয়ে লগইন</button>
        </div>
        <div id="comments-list" class="space-y-6 pb-20">
            <p class="text-gray-500 text-sm text-center">মন্তব্য লোড হচ্ছে...</p>
        </div>
    </section>
</main>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    const ADMIN_EMAIL = "phys.arif@gmail.com";
    
    let currentUser = null;
    let postData = null;
    let quill;

    function timeAgo(timestamp) {
        if (!timestamp) return "";
        const now = new Date();
        const past = timestamp.toDate();
        const diffInSeconds = Math.floor((now - past) / 1000);

        const units = [
            { label: "বছর", seconds: 31536000 },
            { label: "মাস", seconds: 2592000 },
            { label: "দিন", seconds: 86400 },
            { label: "ঘণ্টা", seconds: 3600 },
            { label: "মিনিট", seconds: 60 },
            { label: "সেকেন্ড", seconds: 1 }
        ];

        for (const unit of units) {
            const interval = Math.floor(diffInSeconds / unit.seconds);
            if (interval >= 1) {
                return `${interval} ${unit.label} আগে`;
            }
        }
        return "এইমাত্র";
    }

    function initQuill() {
        if (!quill) {
            quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        ['bold', 'italic', 'underline', 'blockquote'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'image'],
                        ['clean']
                    ]
                }
            });
        }
    }

    window.toggleEditModal = (show) => {
        const modal = document.getElementById('edit-modal');
        if (show) {
            initQuill();
            quill.root.innerHTML = postData.msg;
            modal.classList.remove('hidden');
        } else {
            modal.classList.add('hidden');
        }
    };

    window.handleAction = async (type) => {
        if (!postId || !currentUser) return;
        const isAdmin = currentUser.email === ADMIN_EMAIL;
        const isAuthor = postData && postData.uid === currentUser.uid;
        if (!isAdmin && !isAuthor) return;

        if (type === 'delete') {
            const confirmDel = confirm("আপনি কি নিশ্চিতভাবে এই পোস্টটি ডিলিট করতে চান?");
            if (confirmDel) {
                try {
                    await deleteDoc(doc(db, 'blog_comments/pages/forum_v2_voted', postId));
                    window.history.back();
                } catch (e) { console.error(e); }
            }
        } else if (type === 'edit') {
            window.toggleEditModal(true);
        } else if (type === 'featured' && isAdmin) {
            try {
                await updateDoc(doc(db, 'blog_comments/pages/forum_v2_voted', postId), { featured: true });
                alert("পোস্টটি ফিচারড করা হয়েছে।");
            } catch (e) { console.error(e); }
        }
    };

    document.getElementById('save-edit-btn').onclick = async () => {
        const btn = document.getElementById('save-edit-btn');
        const newMsg = quill.root.innerHTML;
        if (!quill.getText().trim()) return;
        try {
            btn.disabled = true;
            btn.innerText = "সেভ হচ্ছে...";
            await updateDoc(doc(db, 'blog_comments/pages/forum_v2_voted', postId), {
                msg: newMsg,
                updatedAt: serverTimestamp()
            });
            window.toggleEditModal(false);
            location.reload(); 
        } catch (e) { console.error(e); } finally {
            btn.disabled = false;
            btn.innerText = "সেভ করুন";
        }
    };

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        const form = document.getElementById('comment-form-container');
        const prompt = document.getElementById('login-prompt');
        if (user) {
            form.classList.remove('hidden');
            prompt.classList.add('hidden');
            document.getElementById('current-user-name').innerText = user.displayName;
            document.getElementById('current-user-img').src = user.photoURL;
        } else {
            form.classList.add('hidden');
            prompt.classList.remove('hidden');
        }
        if (postData) renderActionIcons();
        loadComments();
    });

    function renderActionIcons() {
        const container = document.getElementById('action-icons');
        if (!currentUser) {
            container.innerHTML = `<button onclick="alert('বুকমার্ক করতে লগইন করুন')" class="nav-icon" title="বুকমার্ক"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg></button>`;
            return;
        }
        const isAdmin = currentUser.email === ADMIN_EMAIL;
        const isAuthor = postData.uid === currentUser.uid;
        let html = "";
        if (isAdmin) {
            html += `<button onclick="handleAction('featured')" class="nav-icon text-amber-500" title="ফিচারড"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"></path></svg></button>`;
        }
        if (isAdmin || isAuthor) {
            html += `
                <button onclick="handleAction('delete')" class="nav-icon text-red-500" title="ডিলিট"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                <button onclick="handleAction('edit')" class="nav-icon text-accent" title="এডিট"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
            `;
        }
        html += `<button onclick="alert('বুকমার্ক করা হয়েছে')" class="nav-icon" title="বুকমার্ক"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg></button>`;
        container.innerHTML = html;
    }

    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

    async function loadPost() {
        if (!postId) return;
        try {
            const docSnap = await getDoc(doc(db, 'blog_comments/pages/forum_v2_voted', postId));
            if (docSnap.exists()) {
                postData = docSnap.data();
                document.getElementById('post-content').innerHTML = postData.msg;
                document.getElementById('author-name').innerText = postData.name;
                const authorImg = document.getElementById('author-img');
                authorImg.src = postData.photoURL || `https://ui-avatars.com/api/?name=${postData.name}&background=random`;
                authorImg.classList.remove('hidden');
                
                if (postData.at) {
                    document.getElementById('post-date').innerText = timeAgo(postData.at);
                }
                
                if (postData.hashtags) {
                    document.getElementById('post-tags').innerHTML = postData.hashtags.map(tag => `<span class="bg-gray-100 dark:bg-darkCard px-3 py-1 rounded-lg text-xs font-medium">${tag}</span>`).join('');
                }
                renderActionIcons();
            }
        } catch (e) { console.error(e); }
    }

    function loadComments() {
        if (!postId) return;
        const q = query(collection(db, 'blog_comments', postId, 'messages'), orderBy('at', 'desc'));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('comments-list');
            if (snapshot.empty) {
                list.innerHTML = '<p class="text-gray-400 text-sm text-center">এখনো কোনো মন্তব্য নেই।</p>';
                return;
            }
            list.innerHTML = '';
            snapshot.docs.forEach(doc => {
                const d = doc.data();
                const commentId = doc.id;
                const timeStr = timeAgo(d.at);
                const commentEl = document.createElement('div');
                commentEl.className = 'space-y-4';
                commentEl.innerHTML = `
                    <div class="flex gap-3">
                        <img src="${d.photoURL || 'https://www.gravatar.com/avatar/?d=mp'}" class="w-10 h-10 rounded-full">
                        <div class="bg-gray-50 dark:bg-darkCard p-3 rounded-2xl flex-1 border dark:border-darkBorder">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-bold">${d.name}</span>
                                <span class="text-[10px] text-gray-500">${timeStr}</span>
                            </div>
                            <p class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">${d.text}</p>
                            <button onclick="window.toggleReplyForm('${commentId}')" class="mt-2 text-xs font-bold text-accent hover:underline flex items-center gap-1">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
                                উত্তর দিন
                            </button>
                        </div>
                    </div>
                    <div id="reply-form-${commentId}" class="hidden ml-12 bg-gray-50 dark:bg-darkCard p-3 rounded-xl border dark:border-darkBorder">
                        <textarea id="reply-input-${commentId}" rows="2" placeholder="আপনার উত্তর লিখুন..." class="w-full bg-white dark:bg-darkBg border dark:border-darkBorder rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-accent"></textarea>
                        <div class="flex justify-end mt-2">
                            <button onclick="window.submitReply('${commentId}')" class="bg-accent text-white px-4 py-1 rounded-full text-xs font-bold">পাঠান</button>
                        </div>
                    </div>
                    <div id="replies-list-${commentId}" class="ml-12 space-y-3"></div>
                `;
                list.appendChild(commentEl);
                loadReplies(commentId);
            });
        });
    }

    function loadReplies(commentId) {
        const q = query(collection(db, 'blog_comments', postId, 'messages', commentId, 'replies'), orderBy('at', 'asc'));
        onSnapshot(q, (snapshot) => {
            const repliesList = document.getElementById(`replies-list-${commentId}`);
            if (snapshot.empty) return;
            repliesList.innerHTML = snapshot.docs.map(doc => {
                const r = doc.data();
                const timeStr = timeAgo(r.at);
                return `
                    <div class="flex gap-2">
                        <img src="${r.photoURL}" class="w-7 h-7 rounded-full">
                        <div class="bg-gray-100 dark:bg-darkBg/50 p-2 rounded-xl flex-1 border dark:border-darkBorder">
                            <div class="flex justify-between items-center mb-0.5">
                                <span class="text-xs font-bold">${r.name}</span>
                                <span class="text-[9px] text-gray-500">${timeStr}</span>
                            </div>
                            <p class="text-xs text-gray-600 dark:text-gray-400">${r.text}</p>
                        </div>
                    </div>
                `;
            }).join('');
        });
    }

    window.toggleReplyForm = (commentId) => {
        if (!currentUser) return alert("রিপ্লাই দিতে লগইন করুন।");
        document.getElementById(`reply-form-${commentId}`).classList.toggle('hidden');
    };

    window.submitReply = async (commentId) => {
        const input = document.getElementById(`reply-input-${commentId}`);
        const text = input.value.trim();
        if (!text || !currentUser || !postId) return;
        try {
            await addDoc(collection(db, 'blog_comments', postId, 'messages', commentId, 'replies'), {
                name: currentUser.displayName,
                photoURL: currentUser.photoURL,
                uid: currentUser.uid,
                text: text,
                at: serverTimestamp()
            });
            input.value = '';
            document.getElementById(`reply-form-${commentId}`).classList.add('hidden');
        } catch (e) { console.error(e); }
    };

    document.getElementById('submit-comment').onclick = async () => {
        const input = document.getElementById('comment-text');
        const text = input.value.trim();
        const btn = document.getElementById('submit-comment');
        if (!text || !currentUser || !postId) return;
        try {
            btn.disabled = true;
            btn.innerText = "পাঠানো হচ্ছে...";
            await addDoc(collection(db, 'blog_comments', postId, 'messages'), {
                name: currentUser.displayName,
                photoURL: currentUser.photoURL,
                uid: currentUser.uid,
                text: text,
                at: serverTimestamp()
            });
            input.value = '';
        } catch (e) { console.error(e); } finally {
            btn.disabled = false;
            btn.innerText = "মন্তব্য করুন";
        }
    };

    loadPost();
</script>
</body>
</html>
