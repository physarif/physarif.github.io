<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পোস্ট - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .reply-card { border-left: 2px solid #e5e7eb; }
        .dark .reply-card { border-left-color: #2d333b; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 pb-10">

<main class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-center gap-4 mb-6">
        <button onclick="location.href='index.html'" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-xl font-bold">বিস্তারিত</h1>
    </div>

    <div id="main-post-container">
        <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent"></div></div>
    </div>

    <div class="mt-8">
        <h3 class="text-lg font-bold mb-4">মন্তব্যসমূহ</h3>
        <div id="replies-container" class="space-y-4">
            </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    // Get Post ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    if (!postId) {
        location.href = 'index.html';
    }

    // Load Main Post
    onSnapshot(doc(db, BASE_PATH, postId), (docSnap) => {
        if (docSnap.exists()) {
            const p = docSnap.data();
            document.getElementById('main-post-container').innerHTML = `
                <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="${p.photoURL || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full">
                        <div>
                            <p class="text-sm font-bold">${p.name || 'Anonymous'}</p>
                            <p class="text-[10px] text-gray-400">${p.at ? new Date(p.at.seconds * 1000).toLocaleString('bn-BD') : ''}</p>
                        </div>
                    </div>
                    <p class="text-base leading-relaxed text-gray-800 dark:text-gray-200 whitespace-pre-wrap">${p.msg || ''}</p>
                    <div class="mt-6 pt-4 border-t dark:border-darkBorder flex items-center gap-6">
                        <div class="flex items-center gap-1">
                            <span class="text-accent font-bold">${p.votes || 0}</span>
                            <span class="text-xs text-gray-400">ভোট</span>
                        </div>
                    </div>
                </div>
            `;
        } else {
            document.getElementById('main-post-container').innerHTML = `<p class="text-center py-10 text-gray-400">পোস্টটি খুঁজে পাওয়া যায়নি।</p>`;
        }
    });

    // Load Replies
    const q = query(collection(db, BASE_PATH), where("parentId", "==", postId), orderBy("at", "asc"));
    onSnapshot(q, (snapshot) => {
        const replies = snapshot.docs.map(d => d.data());
        const container = document.getElementById('replies-container');
        
        if (replies.length === 0) {
            container.innerHTML = `<p class="text-sm text-gray-400 italic">এখনো কোনো মন্তব্য নেই।</p>`;
            return;
        }

        container.innerHTML = replies.map(r => `
            <div class="reply-card pl-4 py-1">
                <div class="bg-white dark:bg-darkCard p-4 rounded-xl border dark:border-darkBorder shadow-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <img src="${r.photoURL || 'https://via.placeholder.com/20'}" class="w-5 h-5 rounded-full">
                        <span class="text-[11px] font-bold text-gray-500">${r.name || 'Anonymous'}</span>
                    </div>
                    <p class="text-sm text-gray-700 dark:text-gray-300">${r.msg || ''}</p>
                </div>
            </div>
        `).join('');
    });

    // Auto Dark Mode
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>
