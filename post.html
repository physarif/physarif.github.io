<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন লেখা - Summernote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    
    <!-- jQuery required for Summernote -->
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
    <!-- Summernote Lite -->
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .note-editor { border-radius: 12px !important; overflow: hidden; border: 1px solid #2d333b !important; }
        
        /* টুলবার কাস্টমাইজেশন */
        .note-toolbar { 
            background: #f8f9fa !important; 
            border-bottom: 1px solid #2d333b !important; 
            padding: 10px !important;
        }
        
        /* ফ্লেক্স বক্স ব্যবহার করে দুই লাইন নিশ্চিত করা */
        .note-toolbar > .note-btn-group {
            display: inline-block !important;
            margin-bottom: 5px !important;
        }

        .dark .note-editor { background: #15191c !important; color: white !important; }
        .dark .note-toolbar { background: #15191c !important; color: white !important; border-color: #2d333b !important; }
        .dark .note-btn { background: #2d333b !important; color: white !important; border: none; }
        .dark .note-editable { background: #15191c !important; color: white !important; }
        .note-modal-content { border-radius: 16px !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<main class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="location.href='index.html'" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h1 class="text-xl font-bold">নতুন পোস্ট</h1>
        </div>
        <div class="flex gap-2">
            <button id="preview-btn" class="px-4 py-2 bg-gray-200 dark:bg-darkCard rounded-full text-sm font-bold hover:bg-opacity-80 transition-all">প্রিভিউ</button>
            <button id="submit-post" class="publish-btn px-6 py-2 bg-accent text-white rounded-full text-sm font-bold shadow-lg hover:bg-opacity-90 transition-all">পাবলিশ</button>
        </div>
    </div>

    <div class="mb-4">
        <input type="text" id="post-hashtags" placeholder="হ্যাশট্যাগ দিন (যেমন: #কোডিং #JavaScript)" class="w-full bg-white dark:bg-darkCard border dark:border-darkBorder rounded-xl px-4 py-3 text-sm outline-none focus:border-accent">
    </div>

    <div id="editor"></div>

    <div class="flex justify-between items-center mt-3 px-1">
        <span id="draft-status" class="text-[11px] font-medium text-green-500"></span>
        <span id="char-count" class="text-xs text-gray-400">০ শব্দ</span>
    </div>
</main>

<div id="preview-modal" class="fixed inset-0 bg-black/80 hidden z-[110] p-4 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white dark:bg-darkCard w-full max-w-lg rounded-2xl p-6 max-h-[85vh] overflow-y-auto shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b dark:border-darkBorder pb-3">
            <h2 class="text-lg font-bold">প্রিভিউ</h2>
            <button onclick="document.getElementById('preview-modal').classList.add('hidden')" class="text-gray-500 hover:text-red-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="preview-content" class="prose dark:prose-invert max-w-none"></div>
        <button onclick="document.getElementById('preview-modal').classList.add('hidden')" class="mt-8 w-full py-3 bg-accent text-white rounded-xl font-bold">ফিরে যান</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    let currentUser = null;

    $(document).ready(function() {
        $('#editor').summernote({
            placeholder: 'আপনার মনের কথা এখানে লিখুন...',
            height: 350,
            toolbar: [
                // প্রথম লাইন: ফরম্যাটিং
                ['style', ['bold', 'italic', 'underline']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['linebreak', []], // একটি খালি ব্রেক গ্রপ
                // দ্বিতীয় লাইন: লিঙ্ক, ফটো, ভিডিও, কোড
                ['insert', ['link', 'picture', 'video', 'codeview']]
            ],
            callbacks: {
                onChange: function(contents) {
                    localStorage.setItem('sn_draft', contents);
                    document.getElementById('draft-status').innerText = "অটো-সেভ হচ্ছে...";
                    setTimeout(() => document.getElementById('draft-status').innerText = "সেভ হয়েছে", 1000);
                }
            }
        });

        // টুলবার দুই লাইনে দেখানোর জন্য সামান্য CSS হ্যাক
        $('.note-toolbar').find('.note-btn-group:has(button[data-original-title="Link"])').before('<div style="display:block; width:100%; height:0; margin: 5px 0; border-top: 1px solid #ddd;"></div>');

        const saved = localStorage.getItem('sn_draft');
        if (saved) $('#editor').summernote('code', saved);
    });

    onAuthStateChanged(auth, (user) => {
        if (user) currentUser = user;
    });

    document.getElementById('preview-btn').onclick = () => {
        const content = $('#editor').summernote('code');
        document.getElementById('preview-content').innerHTML = content;
        document.getElementById('preview-modal').classList.remove('hidden');
    };

    document.getElementById('submit-post').onclick = async () => {
        if (!currentUser) return;
        const msgHtml = $('#editor').summernote('code');
        const tags = document.getElementById('post-hashtags').value.match(/#[^\s#]+/g) || [];

        try {
            await addDoc(collection(db, BASE_PATH), {
                msg: msgHtml,
                hashtags: tags,
                name: currentUser.displayName,
                uid: currentUser.uid,
                at: serverTimestamp(),
                status: 'pending'
            });
            localStorage.removeItem('sn_draft');
            alert('সফলভাবে পাবলিশ হয়েছে!');
            location.href = 'index.html';
        } catch (e) { 
            alert('পাবলিশ করতে সমস্যা হয়েছে।'); 
        }
    };

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
</script>
</body>
</html>
