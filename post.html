<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পোস্ট - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .prose img { border-radius: 12px; margin: 1.5rem 0; }
        .prose iframe { width: 100%; aspect-ratio: 16 / 9; border-radius: 12px; }
        /* ডার্ক মোডে কন্টেন্টের রং ঠিক রাখা */
        .dark .prose { color: #d1d5db; }
        .dark .prose h1, .dark .prose h2, .dark .prose strong { color: #fff; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<!-- টপ নেভিগেশন -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b dark:border-darkBorder">
    <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
        <button onclick="history.back()" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <span class="font-bold text-lg">পোস্ট বিস্তারিত</span>
        <button class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
        </button>
    </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-6">
    <!-- লেখক পরিচিতি -->
    <div class="flex items-center gap-3 mb-6">
        <img id="author-img" src="https://ui-avatars.com/api/?name=Author&background=random" alt="" class="w-12 h-12 rounded-full object-cover ring-2 ring-accent/20">
        <div>
            <h3 id="author-name" class="font-bold text-base">লেখকের নাম</h3>
            <p id="post-date" class="text-xs text-gray-500 dark:text-gray-400">১০ মিনিট আগে</p>
        </div>
    </div>

    <!-- মূল কন্টেন্ট -->
    <article class="bg-white dark:bg-darkCard rounded-2xl p-6 border dark:border-darkBorder shadow-sm">
        <div id="post-content" class="prose prose-lg dark:prose-invert max-w-none leading-relaxed">
            <!-- কন্টেন্ট এখানে লোড হবে -->
            <div class="animate-pulse space-y-4">
                <div class="h-4 bg-gray-200 dark:bg-darkBorder rounded w-3/4"></div>
                <div class="h-4 bg-gray-200 dark:bg-darkBorder rounded"></div>
                <div class="h-4 bg-gray-200 dark:bg-darkBorder rounded w-5/6"></div>
            </div>
        </div>

        <!-- হ্যাশট্যাগ -->
        <div id="post-tags" class="mt-6 flex flex-wrap gap-2 text-accent font-medium text-sm">
            <!-- হ্যাশট্যাগ এখানে আসবে -->
        </div>
    </article>

    <!-- ভোট এবং রিঅ্যাকশন সেকশন -->
    <div class="flex items-center justify-between mt-6 px-2">
        <div class="flex items-center gap-4">
            <button class="flex items-center gap-2 group">
                <div class="p-2 bg-gray-100 dark:bg-darkCard rounded-lg group-hover:bg-blue-100 dark:group-hover:bg-blue-900/30 transition-colors">
                    <svg class="w-6 h-6 text-gray-600 dark:text-gray-400 group-hover:text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.757c1.246 0 2.25 1.004 2.25 2.25 0 .403-.105.783-.29 1.114l-3 5.4c-.382.688-1.1 1.136-1.896 1.136H7V10l5-5V3.75C12 3.336 12.336 3 12.75 3h.5c.414 0 .75.336.75.75V10z"></path></svg>
                </div>
                <span id="vote-count" class="font-bold">০</span>
            </button>
            
            <div class="flex items-center gap-2 text-gray-500 text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                <span>১২০ বার দেখা হয়েছে</span>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    // আপনার দেওয়া একই কনফিগ
    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    // URL থেকে পোস্ট আইডি নেওয়া (ধরা যাক index.html থেকে ?id=xxx আসবে)
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    async function loadPost() {
        if (!postId) {
            document.getElementById('post-content').innerHTML = "পোস্ট পাওয়া যায়নি।";
            return;
        }

        try {
            const docRef = doc(db, BASE_PATH, postId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // তথ্য সেট করা
                document.getElementById('post-content').innerHTML = data.msg;
                document.getElementById('author-name').innerText = data.name || "অজ্ঞাত লেখক";
                document.getElementById('author-img').src = data.photoURL || `https://ui-avatars.com/api/?name=${data.name}&background=random`;
                document.getElementById('vote-count').innerText = data.votes || 0;
                
                if (data.hashtags && data.hashtags.length > 0) {
                    document.getElementById('post-tags').innerHTML = data.hashtags.map(tag => `<span>${tag}</span>`).join(' ');
                }

                // সময় ফরমেট (সহজ পদ্ধতি)
                if (data.at) {
                    const date = data.at.toDate();
                    document.getElementById('post-date').innerText = date.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
                }
            } else {
                document.getElementById('post-content').innerHTML = "দুঃখিত, এই পোস্টটি মুছে ফেলা হয়েছে।";
            }
        } catch (error) {
            console.error("Error fetching post:", error);
            document.getElementById('post-content').innerHTML = "কন্টেন্ট লোড করতে সমস্যা হয়েছে।";
        }
    }

    // ডার্ক মোড চেক
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }

    loadPost();
</script>
</body>
</html>
