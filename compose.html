<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন লেখা - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .ql-container { font-family: 'Hind Siliguri', sans-serif; font-size: 1.1rem; border: none !important; }
        .ql-toolbar { border: none !important; border-bottom: 1px solid rgba(0,0,0,0.1) !important; border-radius: 12px 12px 0 0; }
        .dark .ql-toolbar { border-bottom: 1px solid #2d333b !important; background: #1a1f24; }
        .dark .ql-snow .ql-stroke { stroke: #e5e7eb; }
        .dark .ql-snow .ql-fill { fill: #e5e7eb; }
        .dark .ql-snow .ql-picker { color: #e5e7eb; }
        .ql-editor { min-height: 400px; line-height: 1.8; }
        .ql-editor iframe.ql-video { width: 100%; aspect-ratio: 16/9; border-radius: 12px; margin: 10px 0; }
        .ql-editor img { border-radius: 12px; margin: 10px 0; max-width: 100%; height: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 antialiased">

<main class="max-w-3xl mx-auto px-4 py-4 md:py-8">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-2 hover:bg-gray-200 dark:hover:bg-darkCard rounded-full transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-bold">নতুন পোস্ট</h1>
        </div>
        <div class="flex gap-2">
            <button id="preview-btn" class="px-4 py-2 bg-gray-200 dark:bg-darkCard rounded-xl text-sm font-semibold hover:bg-gray-300 dark:hover:bg-gray-800 transition-all">প্রিভিউ</button>
            <button id="submit-post" class="px-6 py-2 bg-accent text-white rounded-xl text-sm font-bold shadow-lg shadow-accent/30 hover:scale-105 active:scale-95 transition-all">পাবলিশ</button>
        </div>
    </div>

    <!-- Hashtags -->
    <div class="mb-4">
        <input type="text" id="post-hashtags" placeholder="হ্যাশট্যাগ দিন (উদা: #ছবি #গল্প)" class="w-full bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-accent/50 outline-none transition-all shadow-sm">
    </div>

    <!-- Editor Container -->
    <div class="bg-white dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-darkBorder overflow-hidden shadow-sm transition-all">
        <div id="editor"></div>
    </div>

    <!-- Footer Info -->
    <div class="flex justify-between items-center mt-4 px-1">
        <div class="flex items-center gap-2">
            <div id="sync-icon" class="w-2 h-2 rounded-full bg-green-500"></div>
            <span id="draft-status" class="text-xs font-medium text-gray-500">অটো-সেভ সক্রিয়</span>
        </div>
        <div class="flex gap-4 text-xs font-medium text-gray-500">
            <span id="word-count">০ শব্দ</span>
            <span id="char-count">০ অক্ষর</span>
        </div>
    </div>
</main>

<!-- Preview Modal -->
<div id="preview-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden z-[110] p-4 flex items-center justify-center">
    <div class="bg-white dark:bg-darkCard w-full max-w-2xl rounded-3xl p-6 md:p-8 max-h-[90vh] overflow-y-auto shadow-2xl relative">
        <button onclick="togglePreview(false)" class="absolute top-4 right-4 p-2 bg-gray-100 dark:bg-darkBg rounded-full hover:text-red-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div id="preview-content" class="prose prose-blue dark:prose-invert max-w-none mb-6"></div>
        <div id="preview-tags" class="flex flex-wrap gap-2 text-accent font-bold"></div>
        <button onclick="togglePreview(false)" class="mt-8 w-full py-4 bg-accent text-white rounded-2xl font-bold">সম্পাদনা চালিয়ে যান</button>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'আপনার মনের কথা এখানে লিখুন...',
        modules: {
            toolbar: [
                [{ 'header': [2, 3, false] }],
                ['bold', 'italic', 'underline'],
                ['blockquote', 'link', 'image', 'video'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    // Custom Image Handler: Only Link option
    quill.getModule('toolbar').addHandler('image', () => {
        const url = prompt('ছবির সরাসরি লিঙ্ক (Image URL) দিন:');
        if (url) {
            const range = quill.getSelection();
            quill.insertEmbed(range ? range.index : 0, 'image', url);
        }
    });

    // Custom Video Handler
    quill.getModule('toolbar').addHandler('video', () => {
        const url = prompt('ভিডিও লিঙ্ক (YouTube/Vimeo) দিন:');
        if (url) {
            const range = quill.getSelection();
            quill.insertEmbed(range ? range.index : 0, 'video', url);
        }
    });

    let currentUser = null;
    onAuthStateChanged(auth, (user) => { currentUser = user; });

    quill.on('text-change', () => {
        const text = quill.getText().trim();
        document.getElementById('char-count').innerText = `${text.length} অক্ষর`;
        document.getElementById('word-count').innerText = `${text.length > 0 ? text.split(/\s+/).length : 0} শব্দ`;
    });

    window.togglePreview = (show) => {
        const modal = document.getElementById('preview-modal');
        if(show) {
            document.getElementById('preview-content').innerHTML = quill.root.innerHTML;
            modal.classList.remove('hidden');
        } else {
            modal.classList.add('hidden');
        }
    };

    document.getElementById('preview-btn').onclick = () => togglePreview(true);

    document.getElementById('submit-post').onclick = async () => {
        if (!currentUser) return alert('লগইন করুন');
        try {
            await addDoc(collection(db, 'blog_comments/pages/forum_v2_voted'), {
                msg: quill.root.innerHTML,
                authorName: currentUser.displayName,
                authorUid: currentUser.uid,
                createdAt: serverTimestamp(),
                status: 'pending'
            });
            location.href = 'index.html';
        } catch (e) {
            alert('ত্রুটি হয়েছে');
        }
    };
</script>
</body>
</html>
