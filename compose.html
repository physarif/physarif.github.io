<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন লেখা - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        textarea { resize: none; }
        .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<main class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="location.href='index.html'" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h1 class="text-xl font-bold">নতুন পোস্ট</h1>
        </div>
        <button id="submit-post" class="publish-btn px-6 py-2 bg-accent text-white rounded-full text-sm font-bold shadow-lg shadow-accent/20 hover:bg-opacity-90 transition-all">
            পাবলিশ
        </button>
    </div>

    <div id="auth-check" class="mb-6 flex items-center gap-3 p-3 bg-white dark:bg-darkCard rounded-xl border dark:border-darkBorder">
        <img id="current-user-img" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full">
        <div>
            <p id="current-user-name" class="text-sm font-bold">লগইন করা নেই</p>
            <p class="text-[10px] text-gray-400">আপনার প্রোফাইল থেকে পোস্ট করা হচ্ছে</p>
        </div>
    </div>

    <div class="relative">
        <textarea id="post-content" placeholder="আজ আপনি কী ভাবছেন? আপনার মনের কথা এখানে লিখুন..." 
            class="w-full h-64 p-4 bg-transparent border-none focus:ring-0 text-lg leading-relaxed placeholder-gray-400"
            maxlength="2000"></textarea>
    </div>

    <div class="text-right mt-2">
        <span id="char-count" class="text-xs text-gray-400">০ / ২০০০</span>
    </div>
</main>

<div id="loading-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-[100]">
    <div class="bg-white dark:bg-darkCard p-6 rounded-2xl text-center">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent mx-auto mb-4"></div>
        <p class="text-sm">পোস্ট সেভ হচ্ছে...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('current-user-img').src = user.photoURL;
            document.getElementById('current-user-name').innerText = user.displayName;
        } else {
            alert('পোস্ট করতে আগে লগইন করুন!');
            location.href = 'index.html';
        }
    });

    const textarea = document.getElementById('post-content');
    const charCount = document.getElementById('char-count');
    const submitBtn = document.getElementById('submit-post');
    const loader = document.getElementById('loading-overlay');

    // Live character counter
    textarea.addEventListener('input', () => {
        const length = textarea.value.length;
        charCount.innerText = `${length} / ২০০০`;
    });

    submitBtn.onclick = async () => {
        const msg = textarea.value.trim();

        if (!msg) {
            alert('কিছু তো লিখুন!');
            return;
        }

        if (!currentUser) return;

        loader.classList.remove('hidden');

        try {
            await addDoc(collection(db, BASE_PATH), {
                msg: msg,
                name: currentUser.displayName,
                email: currentUser.email,
                uid: currentUser.uid,
                photoURL: currentUser.photoURL,
                at: serverTimestamp(),
                votes: 0,
                status: 'pending' // Admin checking এর জন্য pending রাখা হলো
            });

            alert('পোস্টটি জমা দেওয়া হয়েছে! এডমিনের অনুমোদনের পর এটি দেখা যাবে।');
            location.href = 'index.html';
        } catch (error) {
            console.error("Error adding document: ", error);
            alert('দুঃখিত, পোস্টটি সেভ করা যায়নি।');
        } finally {
            loader.classList.add('hidden');
        }
    };

    // Auto Dark Mode
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>
