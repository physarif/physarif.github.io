<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন লেখা - লেখক ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; }
        .ql-container { font-family: 'Hind Siliguri', sans-serif; font-size: 1.125rem; border: none !important; }
        .ql-toolbar { border: none !important; border-bottom: 1px solid #2d333b !important; border-radius: 12px 12px 0 0; }
        .dark .ql-editor.ql-blank::before { color: #9ca3af; }
        .dark .ql-snow .ql-stroke { stroke: #fff; }
        .dark .ql-snow .ql-fill { fill: #fff; }
        .dark .ql-snow .ql-picker { color: #fff; }
        .ql-editor { min-height: 300px; }
        .ql-video, .ql-editor img { width: 100%; height: auto; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<main class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <button onclick="location.href='index.html'" class="p-2 hover:bg-gray-100 dark:hover:bg-darkCard rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h1 class="text-xl font-bold">নতুন পোস্ট</h1>
        </div>
        <div class="flex gap-2">
            <button id="preview-btn" class="px-4 py-2 bg-gray-200 dark:bg-darkCard rounded-full text-sm font-bold hover:bg-opacity-80 transition-all">প্রিভিউ</button>
            <button id="submit-post" class="publish-btn px-6 py-2 bg-accent text-white rounded-full text-sm font-bold shadow-lg shadow-accent/20 hover:bg-opacity-90 transition-all">পাবলিশ</button>
        </div>
    </div>

    <div class="mb-4">
        <input type="text" id="post-hashtags" placeholder="হ্যাশট্যাগ দিন (যেমন: #কবিতা #গল্প)" class="w-full bg-white dark:bg-darkCard border dark:border-darkBorder rounded-xl px-4 py-3 text-sm outline-none focus:border-accent transition-all">
    </div>

    <div class="bg-white dark:bg-darkCard rounded-xl border dark:border-darkBorder overflow-hidden">
        <div id="editor"></div>
    </div>

    <div class="flex justify-between items-center mt-3 px-1">
        <span id="draft-status" class="text-[11px] font-medium text-green-500"></span>
        <span id="char-count" class="text-xs text-gray-400">০ / ২০০০ শব্দ</span>
    </div>
</main>

<div id="preview-modal" class="fixed inset-0 bg-black/80 hidden z-[110] p-4 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white dark:bg-darkCard w-full max-w-lg rounded-2xl p-6 max-h-[85vh] overflow-y-auto shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b dark:border-darkBorder pb-3">
            <h2 class="text-lg font-bold">প্রিভিউ</h2>
            <button onclick="document.getElementById('preview-modal').classList.add('hidden')" class="text-gray-500 hover:text-red-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="preview-content" class="prose dark:prose-invert max-w-none"></div>
        <div id="preview-tags" class="mt-4 flex flex-wrap gap-2 font-medium text-accent"></div>
        <button onclick="document.getElementById('preview-modal').classList.add('hidden')" class="mt-8 w-full py-3 bg-accent text-white rounded-xl font-bold">ফিরে যান</button>
    </div>
</div>

<div id="loading-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-[100]">
    <div class="bg-white dark:bg-darkCard p-8 rounded-2xl text-center shadow-2xl">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-accent mx-auto mb-4"></div>
        <p class="text-sm font-medium">পোস্ট হচ্ছে...</p>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';

    // Toolbar without 'clean' (T-cross) button
    const quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'আপনার মনের কথা এখানে লিখুন...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline', 'blockquote'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'image', 'video'] // 'clean' removed from here
            ]
        }
    });

    const toolbar = quill.getModule('toolbar');
    
    // Better Link Handler
    toolbar.addHandler('link', function(value) {
        if (value) {
            const href = prompt('লিংক (URL) দিন:');
            if(href) this.quill.format('link', href);
        } else {
            this.quill.format('link', false);
        }
    });

    // Custom Image URL Handler
    toolbar.addHandler('image', () => {
        const range = quill.getSelection();
        const value = prompt('ইমেজ ইউআরএল (URL) দিন:');
        if (value) {
            quill.insertEmbed(range.index, 'image', value, Quill.sources.USER);
        }
    });

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            const savedDraft = localStorage.getItem('post_draft');
            if (savedDraft) quill.root.innerHTML = savedDraft;
        } else {
            alert('পোস্ট করতে আগে লগইন করুন!');
            location.href = 'index.html';
        }
    });

    quill.on('text-change', () => {
        localStorage.setItem('post_draft', quill.root.innerHTML);
        document.getElementById('char-count').innerText = `${quill.getText().trim().length} / ২০০০ শব্দ`;
        document.getElementById('draft-status').innerText = "অটো-সেভ হচ্ছে...";
        setTimeout(() => document.getElementById('draft-status').innerText = "সেভ হয়েছে", 1000);
    });

    document.getElementById('preview-btn').onclick = () => {
        document.getElementById('preview-content').innerHTML = quill.root.innerHTML;
        const tags = document.getElementById('post-hashtags').value.match(/#[^\s#]+/g) || [];
        document.getElementById('preview-tags').innerText = tags.join(' ');
        document.getElementById('preview-modal').classList.remove('hidden');
    };

    const submitBtn = document.getElementById('submit-post');
    const loader = document.getElementById('loading-overlay');

    submitBtn.onclick = async () => {
        const msgHtml = quill.root.innerHTML;
        const msgText = quill.getText().trim();
        const tags = document.getElementById('post-hashtags').value.match(/#[^\s#]+/g) || [];

        if (!msgText && !msgHtml.includes('<img')) { alert('কিছু তো লিখুন!'); return; }
        if (!currentUser) return;

        loader.classList.remove('hidden');

        try {
            await addDoc(collection(db, BASE_PATH), {
                msg: msgHtml,
                hashtags: tags,
                name: currentUser.displayName,
                email: currentUser.email,
                uid: currentUser.uid,
                photoURL: currentUser.photoURL,
                at: serverTimestamp(),
                votes: 0,
                status: 'pending'
            });
            localStorage.removeItem('post_draft');
            alert('সফলভাবে পাবলিশ করা হয়েছে!');
            location.href = 'index.html';
        } catch (error) {
            alert('ত্রুটি হয়েছে, আবার চেষ্টা করুন।');
        } finally {
            loader.classList.add('hidden');
        }
    };

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
</script>
</body>
</html>
