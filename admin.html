<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লেখন ফোরাম - অ্যাডমিন প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0b0e11', darkCard: '#15191c', darkBorder: '#2d333b', accent: '#3498db' } } }
        }
    </script>
    <style>
        .loading-screen { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .dark .loading-screen { background: #0b0e11; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100">

<div id="loading" class="loading-screen">
    <div class="flex flex-col items-center gap-4">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-accent"></div>
        <p class="text-xs font-bold animate-pulse">অ্যাডমিন যাচাই করা হচ্ছে...</p>
    </div>
</div>

<nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-md border-b dark:border-darkBorder">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
            <h1 class="text-xl font-black text-accent tracking-tighter">লেখন. 📝</h1>
            <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase">Admin Panel</span>
        </div>
        <button onclick="location.href='index.html'" class="text-xs font-bold bg-gray-200 dark:bg-darkCard px-4 py-2 rounded-lg">ফিরে যাও</button>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder">
            <h3 class="text-gray-500 text-sm font-bold mb-1">মোট পোস্ট</h3>
            <p id="total-posts" class="text-3xl font-black text-accent">০</p>
        </div>
        <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder">
            <h3 class="text-gray-500 text-sm font-bold mb-1">পেন্ডিং পোস্ট</h3>
            <p id="pending-posts" class="text-3xl font-black text-yellow-500">০</p>
        </div>
        <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder">
            <h3 class="text-gray-500 text-sm font-bold mb-1">রিপোর্টেড</h3>
            <p id="reported-posts" class="text-3xl font-black text-red-500">০</p>
        </div>
    </div>

    <div class="bg-white dark:bg-darkCard rounded-2xl border dark:border-darkBorder overflow-hidden">
        <div class="p-4 border-b dark:border-darkBorder">
            <h2 class="font-bold">পোস্ট ম্যানেজমেন্ট</h2>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 dark:bg-darkBg text-xs uppercase text-gray-500">
                    <tr>
                        <th class="p-4">ব্যবহারকারী</th>
                        <th class="p-4">পোস্ট</th>
                        <th class="p-4">স্ট্যাটাস</th>
                        <th class="p-4 text-right">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body" class="text-sm"></tbody>
            </table>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';
    const ADMIN_EMAIL = 'phys.arif@gmail.com';

    onAuthStateChanged(auth, (user) => {
        // console.log("Current User:", user?.email); // এটি দিয়ে চেক করতে পারো ইমেইল ঠিক আসছে কি না
        if (user) {
            if (user.email === ADMIN_EMAIL) {
                document.getElementById('loading').style.display = 'none';
                loadAdminData();
            } else {
                alert("আপনার অ্যাডমিন এক্সেস নেই!");
                window.location.href = 'index.html';
            }
        } else {
            // ইউজার লগইন না করা থাকলে হোমপেজে নিয়ে যাবে
            window.location.href = 'index.html';
        }
    });

    function loadAdminData() {
        onSnapshot(collection(db, BASE_PATH), (snapshot) => {
            const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(data);
            updateStats(data);
        });
    }

    function updateStats(data) {
        document.getElementById('total-posts').innerText = data.length;
        document.getElementById('pending-posts').innerText = data.filter(p => p.status === 'pending').length;
        document.getElementById('reported-posts').innerText = data.filter(p => p.reported).length;
    }

    function renderTable(posts) {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = posts.map(p => `
            <tr class="border-b dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-darkBg/50 transition-colors">
                <td class="p-4">
                    <div class="flex items-center gap-2">
                        <img src="${p.photoURL || 'https://via.placeholder.com/32'}" class="w-8 h-8 rounded-full border border-accent">
                        <div>
                            <p class="font-bold text-xs">${p.name || 'অজানা'}</p>
                            <p class="text-[10px] text-gray-500">${p.category || 'সাধারণ'}</p>
                        </div>
                    </div>
                </td>
                <td class="p-4 max-w-xs truncate text-gray-600 dark:text-gray-300">${p.msg || ''}</td>
                <td class="p-4">
                    <span class="px-2 py-1 rounded text-[10px] font-bold ${p.status === 'approved' ? 'bg-green-100 text-green-600' : 'bg-yellow-100 text-yellow-600'}">
                        ${p.status === 'approved' ? 'Approved' : 'Pending'}
                    </span>
                </td>
                <td class="p-4 text-right space-x-2">
                    ${p.status !== 'approved' ? `<button onclick="updateStatus('${p.id}', 'approved')" class="text-green-500 hover:text-green-600 font-bold text-xs">Approve</button>` : ''}
                    <button onclick="deletePost('${p.id}')" class="text-red-500 hover:text-red-600 font-bold text-xs">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    window.updateStatus = async (id, status) => {
        if(confirm('পোস্টটি অ্যাপ্রুভ করতে চান?')) {
            try {
                await updateDoc(doc(db, BASE_PATH, id), { status });
            } catch (e) { alert("Error: " + e.message); }
        }
    };

    window.deletePost = async (id) => {
        if(confirm('আপনি কি নিশ্চিত যে পোস্টটি ডিলিট করতে চান?')) {
            try {
                await deleteDoc(doc(db, BASE_PATH, id));
            } catch (e) { alert("Error: " + e.message); }
        }
    };
</script>
</body>
</html>
