<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কন্ট্রোল প্যানেল - লেখন ফোরাম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', darkCard: '#15191c', darkBorder: '#2d333b', accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 hidden" id="admin-body">

<nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-md border-b dark:border-darkBorder">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <h1 class="text-xl font-black text-accent tracking-tighter cursor-pointer" onclick="location.href='index.html'">লেখন অ্যাডমিন. 🛡️</h1>
        <div class="flex items-center gap-4">
            <span id="admin-name" class="text-xs font-bold text-gray-500"></span>
            <button onclick="location.href='index.html'" class="text-xs font-bold bg-gray-200 dark:bg-darkCard px-3 py-1.5 rounded-lg">হোম পেজ</button>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder shadow-sm">
            <p class="text-gray-500 text-xs font-bold uppercase mb-1">মোট পোস্ট</p>
            <h3 id="total-posts" class="text-3xl font-black text-accent">0</h3>
        </div>
        <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder shadow-sm">
            <p class="text-gray-500 text-xs font-bold uppercase mb-1">পেন্ডিং পোস্ট</p>
            <h3 id="pending-count" class="text-3xl font-black text-orange-500">0</h3>
        </div>
        <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border dark:border-darkBorder shadow-sm">
            <p class="text-gray-500 text-xs font-bold uppercase mb-1">ফিচারড পোস্ট</p>
            <h3 id="featured-count" class="text-3xl font-black text-green-500">0</h3>
        </div>
    </div>

    <div id="admin-posts-container" class="space-y-4">
        <div class="flex justify-center py-20"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent"></div></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_xkcJ87-E4jkYIDT2dBxOFJHUQvZxbU8",
        authDomain: "myblogcomments-22808.firebaseapp.com",
        projectId: "myblogcomments-22808",
        storageBucket: "myblogcomments-22808.firebasestorage.app",
        messagingSenderId: "1067155293144",
        appId: "1:1067155293144:web:8f10b016462b52d36628ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const BASE_PATH = 'blog_comments/pages/forum_v2_voted';
    const ADMIN_EMAIL = "phys.arif@gmail.com";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('admin-body').classList.remove('hidden');
            document.getElementById('admin-name').innerText = "হ্যালো, আরিফ!";
            loadData();
        } else {
            alert("প্রবেশ নিষেধ!");
            window.location.href = "index.html";
        }
    });

    function loadData() {
        onSnapshot(collection(db, BASE_PATH), (snapshot) => {
            const allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('total-posts').innerText = allData.length;
            document.getElementById('pending-count').innerText = allData.filter(p => p.status === 'pending').length;
            document.getElementById('featured-count').innerText = allData.filter(p => p.featured).length;
            renderAdminPosts(allData);
        });
    }

    function renderAdminPosts(posts) {
        const container = document.getElementById('admin-posts-container');
        posts.sort((a, b) => (b.at?.seconds || 0) - (a.at?.seconds || 0));
        container.innerHTML = posts.map(p => `
            <div class="bg-white dark:bg-darkCard p-5 rounded-xl border dark:border-darkBorder shadow-sm">
                <div class="flex items-center gap-2 mb-2">
                    <img src="${p.photoURL}" class="w-6 h-6 rounded-full">
                    <span class="text-xs font-bold">${p.name}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded ${p.status === 'pending' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'} font-bold uppercase">${p.status}</span>
                </div>
                <p class="text-sm text-gray-700 dark:text-gray-300 mb-4">${p.msg}</p>
                <div class="flex gap-2">
                    ${p.status === 'pending' ? `<button onclick="updateStatus('${p.id}', 'approved')" class="bg-green-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">APPROVE</button>` : ''}
                    <button onclick="toggleFeature('${p.id}', ${p.featured || false})" class="bg-blue-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">${p.featured ? 'UNFEATURE' : 'FEATURE'}</button>
                    <button onclick="deletePost('${p.id}')" class="bg-red-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">DELETE</button>
                </div>
            </div>`).join('');
    }

    window.updateStatus = async (id, status) => { await updateDoc(doc(db, BASE_PATH, id), { status }); };
    window.toggleFeature = async (id, cur) => { await updateDoc(doc(db, BASE_PATH, id), { featured: !cur }); };
    window.deletePost = async (id) => { if(confirm('ডিলিট করবেন?')) await deleteDoc(doc(db, BASE_PATH, id)); };
</script>
</body>
</html>
