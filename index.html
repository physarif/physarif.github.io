<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লেখন ফোরাম - হোম</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        darkBg: '#0b0e11', 
                        darkCard: '#15191c', 
                        darkBorder: '#2d333b', 
                        accent: '#3498db'
                    } 
                } 
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100" onclick="closeAllDropdowns(event)">

<nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkBg/90 backdrop-blur-md border-b dark:border-darkBorder">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
        <h1 class="text-xl font-black text-accent tracking-tighter cursor-pointer" onclick="location.href='index.html'">লেখন. 📝</h1>
        <div class="flex items-center gap-2">
            <button id="theme-toggle" class="p-2 rounded-xl bg-gray-100 dark:bg-darkCard hover:ring-2 ring-accent transition-all">
                <svg id="theme-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
            </button>
            <div id="auth-section">
                <button id="login-ui" onclick="googleLogin()" class="bg-accent text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-lg">Login</button>
                <div id="user-info-wrapper" class="hidden flex items-center gap-2 cursor-pointer relative" onclick="toggleUserDropdown(event)">
                    <img id="user-avatar" class="w-8 h-8 rounded-lg border-2 border-accent">
                    <div id="user-dropdown" class="dropdown-menu">
                        <button onclick="openProfile(window.currentUser.uid)" class="w-full text-left px-4 py-3 text-xs font-bold hover:bg-gray-50 dark:hover:bg-darkBg">আমার প্রোফাইল</button>
                        <button onclick="googleLogout()" class="w-full text-left px-4 py-3 text-xs font-bold text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10">লগ আউট</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-4xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
    <aside class="w-full lg:w-48">
        <div class="sticky top-20 space-y-1">
            <button id="filter-latest" onclick="setFilter('latest')" class="filter-btn filter-active w-full text-left px-3 py-2 rounded-xl text-sm font-semibold transition-all">সর্বশেষ</button>
            <button id="filter-popular" onclick="setFilter('popular')" class="filter-btn w-full text-left px-3 py-2 rounded-xl text-sm font-semibold transition-all">জনপ্রিয়</button>
        </div>
    </aside>

    <section class="flex-1">
        <div id="posts-container" class="space-y-4">
             <div class="flex justify-center py-20"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-accent"></div></div>
        </div>
    </section>
</main>

<div id="fab-post" class="fab-post" onclick="handleFabClick()">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
</div>

<div id="toast"></div>

<script type="module" src="javascript.js"></script>

</body>
</html>
